<div id="sankey-container" class="space-y-3">
  <!-- Header -->
  <div class="flex items-center gap-2 mb-3">
    <i class="fas fa-diagram-project text-indigo-500"></i>
    <h2 class="font-semibold text-stone-700 dark:text-gray-200 text-sm uppercase tracking-wide">
      📊 Sankey — Aliran Keuangan
    </h2>
    <div class="ml-auto flex items-center gap-2">
      <!-- Month selector -->
      <select
        id="sankey-month"
        name="month"
        class="text-xs bg-stone-100 dark:bg-gray-800 border border-stone-200 dark:border-gray-700 rounded-lg px-2 py-1"
        hx-get="/api/stats/sankey"
        hx-target="#sankey-container"
        hx-swap="outerHTML"
        hx-trigger="change"
      >
        {% set months = [
          (1, 'Januari'), (2, 'Februari'), (3, 'Maret'), (4, 'April'),
          (5, 'Mei'), (6, 'Juni'), (7, 'Juli'), (8, 'Agustus'),
          (9, 'September'), (10, 'Oktober'), (11, 'November'), (12, 'Desember')
        ] %}
        {% for m_num, m_name in months %}
        <option value="{{ m_num }}" {% if m_num == sankey.month %}selected{% endif %}>{{ m_name }}</option>
        {% endfor %}
      </select>
      <select
        id="sankey-year"
        name="year"
        class="text-xs bg-stone-100 dark:bg-gray-800 border border-stone-200 dark:border-gray-700 rounded-lg px-2 py-1"
        hx-get="/api/stats/sankey"
        hx-target="#sankey-container"
        hx-swap="outerHTML"
        hx-trigger="change"
      >
        {% for y in range(2024, 2031) %}
        <option value="{{ y }}" {% if y == sankey.year %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <!-- Summary -->
  <div class="grid grid-cols-2 gap-2 mb-2">
    <div class="text-center p-2 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl">
      <p class="text-xs text-stone-400 dark:text-gray-400 mb-0.5">Total Pemasukan</p>
      <p class="text-sm font-bold text-emerald-600 dark:text-emerald-400" id="sankey-income">
        Rp {{ "{:,.0f}".format(sankey.total_income) }}
      </p>
    </div>
    <div class="text-center p-2 bg-rose-50 dark:bg-rose-900/20 rounded-xl">
      <p class="text-xs text-stone-400 dark:text-gray-400 mb-0.5">Total Pengeluaran</p>
      <p class="text-sm font-bold text-rose-600 dark:text-rose-400" id="sankey-expense">
        Rp {{ "{:,.0f}".format(sankey.total_expense) }}
      </p>
    </div>
  </div>

  <!-- Sankey Diagram -->
  <div id="sankey-chart" class="w-full overflow-x-auto" style="min-height: 300px;"></div>

  <!-- Legend -->
  <div class="flex flex-wrap gap-3 text-xs text-stone-500 dark:text-gray-400">
    <span><span class="inline-block w-3 h-3 bg-emerald-500 rounded-sm mr-1"></span> Pemasukan</span>
    <span><span class="inline-block w-3 h-3 bg-indigo-500 rounded-sm mr-1"></span> Kategori</span>
    <span><span class="inline-block w-3 h-3 bg-rose-400 rounded-sm mr-1"></span> Subkategori</span>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
(function() {
  const data = {{ sankey | tojson }};
  const nodes = data.nodes;
  const links = data.links;

  if (nodes.length <= 2 && nodes.some(n => n.name === 'Tidak ada data')) {
    document.getElementById('sankey-chart').innerHTML =
      '<p class="text-center text-stone-400 py-8">Tidak ada data untuk bulan ini</p>';
    return;
  }

  const container = document.getElementById('sankey-chart');
  const width = container.clientWidth || 700;
  const height = Math.max(300, nodes.length * 28);

  // Clear previous
  container.innerHTML = '';

  const svg = d3.select('#sankey-chart')
    .append('svg')
    .attr('width', width)
    .attr('height', height)
    .attr('viewBox', [0, 0, width, height]);

  const sankey = d3.sankey()
    .nodeWidth(20)
    .nodePadding(12)
    .extent([[1, 1], [width - 1, height - 6]])
    .nodeId(d => d.name);

  const {nodes: sankeyNodes, links: sankeyLinks} = sankey({
    nodes: nodes.map(d => Object.assign({}, d)),
    links: links.map(d => Object.assign({}, d))
  });

  // Color scale
  const colorMap = {
    income: '#10b981',
    category: '#6366f1',
    subcategory: '#f43f5e'
  };

  // Links
  svg.append('g')
    .selectAll('path')
    .data(sankeyLinks)
    .join('path')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('stroke', d => {
      const src = sankeyNodes[d.source.index || d.source];
      return src.type === 'income' ? '#10b981' : '#6366f1';
    })
    .attr('stroke-width', d => Math.max(1, d.width))
    .attr('fill', 'none')
    .attr('opacity', 0.4);

  // Nodes
  const nodeG = svg.append('g')
    .selectAll('g')
    .data(sankeyNodes)
    .join('g');

  nodeG.append('rect')
    .attr('x', d => d.x0)
    .attr('y', d => d.y0)
    .attr('height', d => Math.max(1, d.y1 - d.y0))
    .attr('width', d => d.x1 - d.x0)
    .attr('fill', d => colorMap[d.type] || '#94a3b8')
    .attr('rx', 4);

  // Labels
  nodeG.append('text')
    .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
    .attr('y', d => (d.y1 + d.y0) / 2)
    .attr('dy', '0.35em')
    .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
    .attr('font-size', '10px')
    .attr('fill', 'currentColor')
    .attr('class', 'text-stone-600 dark:text-gray-300')
    .text(d => {
      const label = d.name.length > 20 ? d.name.substring(0, 18) + '...' : d.name;
      if (d.total) {
        const rp = new Intl.NumberFormat('id-ID', {notation: 'compact', maximumFractionDigits: 1}).format(d.total);
        return label + ' (Rp ' + rp + ')';
      }
      return label;
    });

  // Tooltips
  nodeG.append('title')
    .text(d => {
      let t = d.name;
      if (d.total) t += '\nRp ' + new Intl.NumberFormat('id-ID').format(d.total);
      return t;
    });

})();
</script>
