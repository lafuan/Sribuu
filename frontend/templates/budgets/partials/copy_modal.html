<!-- Copy Budget Modal -->
<div id="copyBudgetModal" class="fixed inset-0 z-50 bg-black/30 flex items-center justify-center p-4"
     onclick="if(event.target===this)closeCopyModal()">
  <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md shadow-xl max-h-[90vh] overflow-y-auto">
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-5 border-b border-stone-100 dark:border-gray-700 sticky top-0 bg-white dark:bg-gray-800 rounded-t-2xl">
      <div>
        <h2 class="font-bold text-stone-700 dark:text-gray-200 text-lg">📋 Salin Anggaran</h2>
        <p class="text-xs text-stone-400 dark:text-gray-500 mt-0.5">Adjust jumlah sebelum disimpan</p>
      </div>
      <button onclick="closeCopyModal()" class="w-9 h-9 flex items-center justify-center rounded-full bg-stone-100 dark:bg-gray-700 hover:bg-stone-200 dark:hover:bg-gray-600 text-stone-500 dark:text-gray-300 hover:text-stone-700 dark:hover:text-gray-100 transition">
        <i class="fas fa-times"></i>
      </button>
    </div>

    {% if budgets_to_copy %}
    <form hx-post="/api/budgets/bulk-create"
          hx-target="#budget-list"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful) { closeCopyModal(); }"
          class="p-5 space-y-3">
      <p class="text-sm text-stone-500 dark:text-gray-400">
        {{ budgets_to_copy | length }} anggaran akan disalin:
      </p>

      <!-- Hidden fields for bulk create -->
      {% for b in budgets_to_copy %}
      <input type="hidden" name="category_id_{{ loop.index0 }}" value="{{ b.category_id }}">
      <input type="hidden" name="month_{{ loop.index0 }}" value="{{ b.month }}">
      <input type="hidden" name="year_{{ loop.index0 }}" value="{{ b.year }}">

      <div class="flex items-center gap-3 p-3 bg-stone-50 dark:bg-gray-700/50 rounded-xl">
        <span class="text-lg">{{ b.category_icon }}</span>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-stone-700 dark:text-gray-200 truncate">{{ b.category_name }}</p>
        </div>
        <div class="w-32">
          <input type="number"
                 name="amount_{{ loop.index0 }}"
                 value="{{ b.amount }}"
                 min="1"
                 class="w-full px-2 py-1.5 border border-stone-200 dark:border-gray-600 rounded-lg text-sm outline-none focus:border-emerald-400 bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200 text-right"
                 placeholder="0">
        </div>
      </div>
      {% endfor %}

      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeCopyModal()" class="btn flex-1 bg-stone-100 dark:bg-gray-700 hover:bg-stone-200 dark:hover:bg-gray-600 text-stone-600 dark:text-gray-300">
          Batal
        </button>
        <button type="submit" class="btn-primary flex-1 flex items-center justify-center gap-2">
          <i class="fas fa-copy"></i> Salin {{ budgets_to_copy | length }} Anggaran
        </button>
      </div>
    </form>
    {% else %}
    <div class="p-8 text-center">
      <div class="w-16 h-16 bg-stone-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-3">
        <i class="fas fa-inbox text-stone-300 dark:text-gray-600 text-2xl"></i>
      </div>
      <p class="text-sm text-stone-500 dark:text-gray-400">Tidak ada anggaran di bulan sebelumnya</p>
      <button onclick="closeCopyModal()" class="btn mt-4 bg-stone-100 dark:bg-gray-700 hover:bg-stone-200 dark:hover:bg-gray-600 text-stone-600 dark:text-gray-300">
        Tutup
      </button>
    </div>
    {% endif %}
  </div>
</div>

<script>
function closeCopyModal() {
  var modal = document.getElementById('copyBudgetModal');
  if (modal) modal.classList.add('hidden');
}

// Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var modal = document.getElementById('copyBudgetModal');
    if (modal && !modal.classList.contains('hidden')) {
      closeCopyModal();
    }
  }
});
</script>
