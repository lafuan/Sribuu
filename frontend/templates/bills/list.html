{% extends "base.html" %}
{% block title %}Bills — Sribuu{% endblock %}

{% block body %}
<main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-amber-100 dark:bg-amber-900/40 rounded-xl flex items-center justify-center">
        <i class="fas fa-bell text-amber-600 dark:text-amber-400 text-lg"></i>
      </div>
      <div>
        <h2 class="font-bold text-stone-700 dark:text-gray-200 text-lg">Bills</h2>
        <p class="text-xs text-stone-400 dark:text-gray-500">Manage your regular bills</p>
      </div>
    </div>
    <button onclick="document.getElementById('add-bill-form').classList.toggle('hidden')"
            class="btn-primary flex items-center gap-1 text-sm">
      <i class="fas fa-plus"></i> Add
    </button>
  </div>

  <!-- Add Form -->
  <div id="add-bill-form" class="card hidden">
    <h3 class="font-semibold text-stone-700 dark:text-gray-200 text-sm mb-4">Add New Bill</h3>
    <form
      hx-post="/api/bills"
      hx-target="#bills-list"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) { this.reset(); document.getElementById('add-bill-form').classList.add('hidden'); }"
    >
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="block text-xs text-stone-500 dark:text-gray-400 mb-1">Bill Name</label>
          <input type="text" name="name" required placeholder="e.g. Electricity, Water, Internet"
                 class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200 outline-none focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-xs text-stone-500 dark:text-gray-400 mb-1">Amount (Rp)</label>
          <input type="number" name="amount" required placeholder="0" min="1"
                 class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200 outline-none focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-xs text-stone-500 dark:text-gray-400 mb-1">Due Date</label>
          <input type="date" name="due_date" required
                 class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200 outline-none focus:border-emerald-500">
        </div>
        <div>
          <label class="block text-xs text-stone-500 dark:text-gray-400 mb-1">Frequency</label>
          <select name="frequency"
                  class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200 outline-none focus:border-emerald-500">
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-stone-500 dark:text-gray-400 mb-1">Category</label>
          <select name="category_id" required
                  class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200 outline-none focus:border-emerald-500">
            <option value="">Select Category</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button type="submit" class="btn-primary text-sm flex-1">Save</button>
        <button type="button" onclick="document.getElementById('add-bill-form').classList.add('hidden')"
                class="btn-secondary text-sm flex-1">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Bills List -->
  <div class="card" id="bills-list">
    <div class="flex items-center gap-2 mb-3">
      <i class="fas fa-list text-emerald-500"></i>
      <h2 class="font-semibold text-stone-700 dark:text-gray-200 text-sm uppercase tracking-wide">All Bills</h2>
    </div>
    {% include "bills/partials/list_items.html" %}
  </div>

</main>
{% endblock %}
