{% extends "base.html" %}
{% block title %}Register — Sribuu{% endblock %}

{% block head %}
<style>
    .auth-card {
        background: white;
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    }
    .dark .auth-card { background: #1c1917; }
    .auth-input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #e7e5e4;
        border-radius: 10px;
        font-size: 14px;
        color: #44403c;
        outline: none;
        transition: all 0.2s;
        background: #fafaf9;
    }
    .dark .auth-input { background: #292524; border-color: #57534e; color: #e7e5e4; }
    .auth-input:focus {
        border-color: #10b981;
        box-shadow: 0 0 0 3px rgba(16,185,129,0.08);
        background: white;
    }
    .dark .auth-input:focus { background: #44403c; }
</style>
{% endblock %}

{% block body %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-8">
  <div class="auth-card w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-7">
      <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-wallet text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-stone-800 dark:text-gray-100">Create Account</h1>
      <p class="text-sm text-stone-400 dark:text-gray-500 mt-1">Sign up to start tracking expenses</p>
    </div>

    <!-- Form -->
    <form method="POST" action="/register" class="space-y-4">
      <!-- Name -->
      <div>
        <label for="name" class="block text-xs font-semibold text-stone-600 dark:text-gray-300 mb-1.5">
          Full Name <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 dark:text-gray-500 text-sm"></i>
          <input type="text" id="name" name="name" required autofocus
                 placeholder="Your name"
                 class="auth-input pl-11"
                 value="{{ name if name else '' }}">
        </div>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-xs font-semibold text-stone-600 dark:text-gray-300 mb-1.5">
          Email <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 dark:text-gray-500 text-sm"></i>
          <input type="email" id="email" name="email" required
                 placeholder="you@email.com"
                 class="auth-input pl-11"
                 value="{{ email if email else '' }}">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-xs font-semibold text-stone-600 dark:text-gray-300 mb-1.5">
          Password <span class="text-red-400">*</span>
        </label>
        <div class="relative" x-data="{ show: false }">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 dark:text-gray-500 text-sm"></i>
          <input :type="show ? 'text' : 'password'" id="password" name="password" required
                 placeholder="Minimum 6 characters"
                 class="auth-input pl-11 pr-11">
          <button type="button" @click="show = !show"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-300 dark:text-gray-500 hover:text-stone-500 dark:hover:text-gray-300 text-sm">
            <i :class="show ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
        <p class="text-xs text-stone-400 dark:text-gray-500 mt-1">Minimum 6 characters</p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm_password" class="block text-xs font-semibold text-stone-600 dark:text-gray-300 mb-1.5">
          Confirm Password <span class="text-red-400">*</span>
        </label>
        <div class="relative" x-data="{ show: false }">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 dark:text-gray-500 text-sm"></i>
          <input :type="show ? 'text' : 'password'" id="password_confirm" name="password_confirm" required
                 placeholder="Repeat password"
                 class="auth-input pl-11 pr-11">
          <button type="button" @click="show = !show"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-300 dark:text-gray-500 hover:text-stone-500 dark:hover:text-gray-300 text-sm">
            <i :class="show ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit"
              class="w-full py-3 bg-emerald-500 text-white font-semibold rounded-xl hover:bg-emerald-600 transition text-sm flex items-center justify-center gap-2 mt-6">
        <i class="fas fa-user-plus"></i> Register
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-stone-200 dark:border-gray-700"></div>
      </div>
      <div class="relative flex justify-center text-xs">
        <span class="bg-white dark:bg-gray-800 px-3 text-stone-400 dark:text-gray-500">already have an account?</span>
      </div>
    </div>

    <!-- Login Link -->
    <a href="/login"
       class="block w-full py-3 border-2 border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 font-semibold rounded-xl hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition text-sm text-center flex items-center justify-center gap-2">
      <i class="fas fa-sign-in-alt"></i> Sign In Now
    </a>
  </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  try {
    const fd = new FormData(this);
    const pw = fd.get('password');
    const pwc = fd.get('password_confirm');
    if (pw !== pwc) {
      alert('Passwords do not match.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
      return;
    }
    const res = await fetch('/api/auth/register', {method: 'POST', body: JSON.stringify({
      name: fd.get('name'), email: fd.get('email'),
      password: pw, password_confirm: pwc
    }), headers: {'Content-Type': 'application/json'}});
    const data = await res.json();
    if (res.ok) {
      window.location = data.data?.redirect || '/';
    } else {
      alert(data.detail?.message || data.message || 'Registration failed');
    }
  } catch (err) {
    alert('Error: ' + err.message);
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
});
</script>
{% endblock %}
