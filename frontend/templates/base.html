<!DOCTYPE html>
<html lang="id" x-data="darkMode()" :class="{ 'dark': isDark }" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Sribuu{% endblock %}</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sribuu">
    <link rel="apple-touch-icon" href="/static/pwa/icon-192.png">
    <link rel="mask-icon" href="/static/pwa/icon-192.png" color="#6366F1">
    <meta name="theme-color" content="#6366F1" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e1b4c" media="(prefers-color-scheme: dark)">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f5f5f4; }
        .dark body, .dark .min-h-screen, body.dark { background: #0c0a09 !important; }
        .card { 
          background-color: white;
          border-radius: 12px;
          padding: 16px;
          border: 1px solid #f0f0f0;
          box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
        }
        .dark .card { 
          background-color: #1c1917 !important;
          border-color: #44403c;
          box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.2);
        }
        .btn-primary { background: #10b981; color: white; border-radius: 10px; padding: 10px 20px; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background: #059669; transform: translateY(-1px); }
        .stat-card { transition: transform 0.15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .category-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        /* Dark mode scrollbar */
        .dark ::-webkit-scrollbar { width: 8px; }
        .dark ::-webkit-scrollbar-track { background: #1c1917; }
        .dark ::-webkit-scrollbar-thumb { background: #44403c; border-radius: 4px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen pb-16 sm:pb-0">

    {% include "components/navbar.html" %}

    {% include "components/flash_messages.html" %}

    {% block body %}{% endblock %}

    {% include "components/footer.html" %}

    {% block scripts %}{% endblock %}

    <!-- ── Dark Mode Alpine Component ── -->
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('darkMode', () => ({
            isDark: false,

            init() {
                // Check localStorage first
                const stored = localStorage.getItem('sribuu_dark_mode');
                if (stored !== null) {
                    this.isDark = stored === 'true';
                } else {
                    // Respect system preference
                    this.isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
                this.applyTheme();
                // Update manifest theme color
                this.updateManifestTheme();
                // Listen for system preference changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (localStorage.getItem('sribuu_dark_mode') === null) {
                        this.isDark = e.matches;
                        this.applyTheme();
                    }
                });
            },

            toggle() {
                this.isDark = !this.isDark;
                localStorage.setItem('sribuu_dark_mode', this.isDark);
                this.applyTheme();
                this.updateManifestTheme();
            },

            applyTheme() {
                if (this.isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                // Update meta theme-color
                const meta = document.querySelector('meta[name="theme-color"]');
                if (meta) {
                    meta.content = this.isDark ? '#0c0a09' : '#6366F1';
                }
            },

            updateManifestTheme() {
                // Update manifest.json theme_color dynamically via link rel=manifest
                const manifestLink = document.querySelector('link[rel="manifest"]');
                if (manifestLink) {
                    fetch('/manifest.json')
                        .then(r => r.json())
                        .then(manifest => {
                            manifest.theme_color = this.isDark ? '#0c0a09' : '#6366F1';
                            manifest.background_color = this.isDark ? '#0c0a09' : '#f5f5f4';
                            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                            manifestLink.href = URL.createObjectURL(blob);
                        })
                        .catch(() => {});
                }
            }
        }));
    });
    </script>
    <!-- PWA: Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(() => console.log('📒 Sribuu PWA: Service Worker registered'))
                    .catch((err) => console.warn('📒 Sribuu PWA: SW registration failed', err));
            });
        }
    </script>

    <!-- Notification Scheduler -->
    <script>
    // ── Global Notification Scheduler ──
    let _reminderInterval = null;
    let _budgetCheckInterval = null;
    let _lastReminderDay = -1;

    /**
     * Kirim notifikasi melalui Service Worker
     */
    function sendNotification(title, body, tag, data) {
        if (Notification.permission !== 'granted') return;
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
                type: 'SHOW_NOTIFICATION',
                payload: { title, body, tag, data },
            });
        } else {
            // Fallback: show directly
            try { new Notification(title, { body, icon: '/static/pwa/icon-192.png', tag, data }); } catch(e) {}
        }
    }

    /**
     * Schedule daily reminder based on user's preferred time
     */
    function scheduleDailyReminder(reminderTime) {
        if (_reminderInterval) {
            clearInterval(_reminderInterval);
            _reminderInterval = null;
        }

        if (!reminderTime) return;

        const parts = reminderTime.split(':');
        if (parts.length !== 2) return;
        const targetHour = parseInt(parts[0], 10);
        const targetMin = parseInt(parts[1], 10);
        if (isNaN(targetHour) || isNaN(targetMin)) return;

        // Check every 30 seconds if it's time
        _reminderInterval = setInterval(() => {
            const now = new Date();
            const today = now.getDate();

            // Only remind once per day
            if (_lastReminderDay === today) return;

            // Check if current time matches reminder time (within 30 sec window)
            if (now.getHours() === targetHour && now.getMinutes() === targetMin) {
                _lastReminderDay = today;
                sendNotification(
                    '📒 Pengingat Sribuu',
                    'Jangan lupa catat pengeluaran hari ini!',
                    'daily-reminder',
                    { url: '/', type: 'daily_reminder' }
                );
            }
        }, 30000); // Check every 30 seconds
    }

    /**
     * Check budget alerts periodically
     */
    function startBudgetAlertChecker() {
        if (_budgetCheckInterval) {
            clearInterval(_budgetCheckInterval);
            _budgetCheckInterval = null;
        }

        // Check immediately on page load
        checkBudgets();

        // Then check every 5 minutes
        _budgetCheckInterval = setInterval(checkBudgets, 300000);
    }

    async function checkBudgets() {
        try {
            const resp = await fetch('/api/notifications/check-budgets');
            if (!resp.ok) return;
            const data = await resp.json();
            if (!data.alerts || data.alerts.length === 0) return;

            // Track which alerts we've already shown
            const shownTags = JSON.parse(sessionStorage.getItem('sribuu_alerted_tags') || '[]');

            for (const alert of data.alerts) {
                const tag = `budget-${alert.category_id}-${alert.type}`;
                if (shownTags.includes(tag)) continue; // Already alerted this session

                sendNotification(
                    alert.urgent ? '🔴 Anggaran Terlewati!' : '🟡 Peringatan Anggaran',
                    alert.message,
                    tag,
                    { url: '/budgets', type: 'budget_alert', category_id: alert.category_id }
                );

                // Mark as shown
                shownTags.push(tag);
            }

            sessionStorage.setItem('sribuu_alerted_tags', JSON.stringify(shownTags));
        } catch (e) {
            console.warn('Budget check failed', e);
        }
    }

    // ── Resume scheduler after page navigation (HTMX-friendly) ──
    document.addEventListener('htmx:afterSettle', () => {
        // Re-trigger budget check after any HTMX update
        if (Notification.permission === 'granted') {
            checkBudgets();
        }
    });

    // ── Load preferences and start schedulers on page load ──
    document.addEventListener('DOMContentLoaded', async () => {
        if (Notification.permission !== 'granted') return;

        try {
            const resp = await fetch('/api/notifications/preferences');
            if (!resp.ok) return;
            const data = await resp.json();

            if (data.notification_enabled) {
                scheduleDailyReminder(data.reminder_time || '20:00');
                startBudgetAlertChecker();
            }
        } catch (e) {
            console.warn('Failed to init notification scheduler', e);
        }
    });

    // ── Notification Badge Alpine Component ──
    document.addEventListener('alpine:init', () => {
        Alpine.data('notifBadge', () => ({
            notifActive: false,

            async init() {
                try {
                    const resp = await fetch('/api/notifications/preferences');
                    if (resp.ok) {
                        const data = await resp.json();
                        this.notifActive = data.notification_enabled && Notification.permission === 'granted';
                    }
                } catch (e) {}
            },

            openNotifPanel() {
                // For now, navigate to settings. Future: slide-out panel.
                window.location.href = '/settings';
            },
        }));
    });
    </script>
</body></html>
