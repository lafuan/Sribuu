<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 w-full max-w-md shadow-xl max-h-[80vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-stone-800 dark:text-gray-100">⚡ Manage Templates</h3>
      <button type="button" class="text-stone-400 dark:text-gray-500 hover:text-stone-600 dark:hover:text-gray-300 text-xl leading-none"
              onclick="this.closest('.fixed').classList.add('hidden')">&times;</button>
    </div>

    <!-- Add template form -->
    <form hx-post="/api/templates"
          hx-target="#template-manage-list"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset(); document.querySelector('#template-feedback')?.remove()"
          class="mb-4 p-3 bg-stone-50 dark:bg-gray-700 rounded-xl space-y-2">

      <input type="hidden" name="sort_order" value="0">

      <div>
        <label class="text-xs font-medium text-stone-600 dark:text-gray-300">Label</label>
        <input type="text" name="label" required maxlength="50" placeholder="e.g. Lunch"
               class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-lg text-sm outline-none focus:border-emerald-400 bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="text-xs font-medium text-stone-600 dark:text-gray-300">Amount (Rp)</label>
          <input type="number" name="amount" required min="1" placeholder="25000"
                 class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-lg text-sm outline-none focus:border-emerald-400 bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200">
        </div>
        <div>
          <label class="text-xs font-medium text-stone-600 dark:text-gray-300">Category</label>
          <select name="category_id" required
                  class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-lg text-sm bg-white dark:bg-gray-800 outline-none focus:border-emerald-400 text-stone-700 dark:text-gray-200">
            <option value="">Select</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div>
        <label class="text-xs font-medium text-stone-600 dark:text-gray-300">Notes <span class="text-stone-300 dark:text-gray-500">(optional)</span></label>
        <input type="text" name="notes" maxlength="500" placeholder="e.g. bought lunch"
               class="w-full px-3 py-2 border border-stone-200 dark:border-gray-600 rounded-lg text-sm outline-none focus:border-emerald-400 bg-white dark:bg-gray-800 text-stone-700 dark:text-gray-200">
      </div>

      <button type="submit" class="w-full py-2 bg-emerald-500 text-white rounded-lg text-sm font-medium hover:bg-emerald-600 transition-colors">
        <i class="fas fa-plus"></i> Add Template
      </button>
    </form>

    <!-- Template list -->
    <div id="template-manage-list" hx-get="/api/templates/manage-list" hx-trigger="load" hx-swap="innerHTML">
      <div class="flex items-center justify-center py-4">
        <div class="w-5 h-5 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    </div>
  </div>
</div>
