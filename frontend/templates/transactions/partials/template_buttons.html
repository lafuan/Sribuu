<div id="template-buttons-container">
  {% if templates and templates|length > 0 %}
  <div class="flex items-center justify-between mb-1">
    <p class="text-xs text-stone-400 uppercase tracking-wide font-medium">⚡ Favorit Transaksi</p>
    <button type="button"
            class="text-xs text-emerald-600 hover:text-emerald-700 font-medium"
            hx-get="/api/templates/manage-modal"
            hx-target="#template-manage-modal"
            hx-swap="innerHTML"
            onclick="document.getElementById('template-manage-modal').classList.remove('hidden')">
      Kelola
    </button>
  </div>
  <div id="template-buttons" class="flex flex-wrap gap-1.5">
    {% for t in templates[:12] %}
    <button type="button"
            class="template-quick-btn text-xs px-3 py-1.5 rounded-lg border border-stone-200 hover:bg-emerald-50 hover:border-emerald-300 transition-colors flex items-center gap-1 cursor-pointer"
            data-amount="{{ t.amount }}"
            data-category-id="{{ t.category.id if t.category else '' }}"
            data-notes="{{ t.notes or '' }}"
            data-label="{{ t.label }}">
      {{ t.category.icon if t.category else '📦' }} {{ t.label }}
    </button>
    {% endfor %}
  </div>
  {% endif %}
</div>
