name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types:
      - completed

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "🚀 Deploy to VPS"
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script_stop: true
          script: |
            set -e

            echo "=== Stopping old native systemd service ==="
            sudo systemctl stop sribuu 2>/dev/null || true
            sudo systemctl disable sribuu 2>/dev/null || true

            echo "=== Stopping old Docker container FIRST (prevent smoke-test race) ==="
            sudo docker stop sribuu 2>/dev/null || true
            sudo docker rm sribuu 2>/dev/null || true

            echo "=== Waiting 15s for old container to fully terminate ==="
            sleep 15

            echo "=== Pulling latest Docker image ==="
            sudo docker pull ghcr.io/lafuan/sribuu:latest || true

            echo "=== Starting new container ==="
            sudo docker run -d --name sribuu --network host --restart always \
              -e DATABASE_URL="postgresql+asyncpg://sribuu:sribuu_dev_2026@localhost:5432/sribuu" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DEBUG="false" \
              ghcr.io/lafuan/sribuu:latest

            echo "=== Cleaning up old images ==="
            sudo docker image prune -f

            echo "=== Health check ==="
            MAX_RETRIES=5
            RETRY_DELAY=3
            for i in $(seq 1 $MAX_RETRIES); do
              sleep "$RETRY_DELAY"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/health" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i/$MAX_RETRIES)"
                exit 0
              fi
              echo "⏳ Attempt $i/$MAX_RETRIES: got status $STATUS, retrying..."
            done

            # Health check gagal — rollback to previous tag
            echo "❌ Health check failed after $MAX_RETRIES attempts."
            echo "Rolling back to previous container..."
            sudo docker rm sribuu 2>/dev/null || true
            IMAGE_TAG=$(sudo docker images ghcr.io/lafuan/sribuu --format "{{.Tag}}" | grep -v latest | tail -1)
            if [ -n "$IMAGE_TAG" ]; then
              sudo docker run -d --name sribuu --network host --restart always \
                -e DATABASE_URL="postgresql+asyncpg://sribuu:sribuu_dev_2026@localhost:5432/sribuu" \
                -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
                -e DEBUG="false" \
                "ghcr.io/lafuan/sribuu:$IMAGE_TAG"
              echo "🔄 Rollback completed to tag $IMAGE_TAG"
            fi
            exit 1

  smoke-test:
    name: "🎭 Post-Deploy Smoke Test"
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright httpx
      - name: Install Playwright browser
        run: playwright install --with-deps chromium
      - name: Run smoke tests against production
        run: |
          python - << 'PYEOF'
          import httpx, time
          BASE_URL = "https://sribuu.duckdns.org"
          EMAIL = f"smoke-{int(time.time())}@test.com"
          PASSWORD = "SmokeTest123!"
          errors = []
          c = httpx.Client(timeout=15, follow_redirects=True)

          # Wait for app to stabilize (up to 20s)
          for i in range(7):
              try:
                  r = c.get(f"{BASE_URL}/health")
                  if r.status_code == 200:
                      if i > 0:
                          print(f"✅ App stable after {i*3}s")
                      break
              except Exception:
                  pass
              time.sleep(3)
          else:
              print("❌ App never stabilized")
              exit(1)

          # Register (httpx auto-saves cookies)
          ok = False
          for attempt in range(3):
              try:
                  r = c.post(f"{BASE_URL}/api/auth/register", json={
                      "name": "Smoke Test",
                      "email": EMAIL,
                      "password": PASSWORD,
                      "password_confirm": PASSWORD,
                  })
                  if r.status_code in (200, 201):
                      print("✅ Register OK")
                      ok = True
                      break
                  elif r.status_code == 422 and "already" in r.text.lower():
                      print("✅ Register OK (user exists)")
                      ok = True
                      break
                  elif r.status_code == 409:
                      # User exists from previous run - try login
                      print("✅ Register OK (user exists)")
                      ok = True
                      break
                  elif attempt < 2:
                      time.sleep(3)
                      continue
                  else:
                      errors.append(f"Register failed: {r.status_code}: {r.text[:100]}")
              except Exception as e:
                  if attempt < 2:
                      time.sleep(3)
                      continue
                  else:
                      errors.append(f"Register error: {e}")

          # Login (httpx auto-sends cookie from register)
          if ok:
              try:
                  r = c.post(f"{BASE_URL}/api/auth/login", json={
                      "email": EMAIL, "password": PASSWORD
                  })
                  if r.status_code != 200:
                      errors.append(f"Login failed: {r.status_code}: {r.text[:100]}")
                  else:
                      print("✅ Login OK")
                      # Dashboard (cookie auto-sent by httpx.Client)
                      r2 = c.get(f"{BASE_URL}/api/stats/summary")
                      if r2.status_code != 200:
                          errors.append(f"Dashboard failed: {r2.status_code}: {r2.text[:100]}")
                      else:
                          print("✅ Dashboard stats OK")
                      # Transactions (cookie auto-sent)
                      r3 = c.get(f"{BASE_URL}/api/transactions")
                      if r3.status_code != 200:
                          errors.append(f"Transactions failed: {r3.status_code}: {r3.text[:100]}")
                      else:
                          print("✅ Transactions list OK")
              except Exception as e:
                  errors.append(f"Login error: {e}")
          c.close()

          if errors:
              print("\n❌ Smoke test failures:")
              for e in errors:
                  print(f"  - {e}")
              exit(1)
          print("\n✅ All smoke tests passed!")
          PYEOF

