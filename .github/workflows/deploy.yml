name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types:
      - completed

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: "🚀 Deploy to VPS"
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Deploy & smoke test via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script: |
            set -e
            HEALTHY=false

            # --- Record previous image tag before pulling latest ---
            PREV_TAG=$(sudo docker images ghcr.io/lafuan/sribuu --format "{{.Tag}}" | grep -v latest | tail -1)
            PREV_IMAGE=""
            if [ -n "$PREV_TAG" ]; then
              PREV_IMAGE="ghcr.io/lafuan/sribuu:$PREV_TAG"
              echo "📦 Previous image saved for rollback: $PREV_IMAGE"
            fi

            echo "=== Stopping old native systemd service ==="
            sudo systemctl stop sribuu 2>/dev/null || true
            sudo systemctl disable sribuu 2>/dev/null || true

            echo "=== Stopping old Docker container FIRST ==="
            sudo docker stop sribuu 2>/dev/null || true
            sudo docker rm sribuu 2>/dev/null || true

            echo "=== Waiting 15s for old container to fully terminate ==="
            sleep 15

            echo "=== Pulling latest Docker image ==="
            sudo docker pull ghcr.io/lafuan/sribuu:latest || true

            echo "=== Starting new container ==="
            sudo docker run -d --name sribuu --network host --restart always \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DEBUG="false" \
              ghcr.io/lafuan/sribuu:latest

            echo "=== Cleaning up old images ==="
            sudo docker image prune -f

            echo "=== Health check ==="
            MAX_RETRIES=5
            RETRY_DELAY=3
            for i in $(seq 1 $MAX_RETRIES); do
              sleep "$RETRY_DELAY"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/health" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i/$MAX_RETRIES)"
                HEALTHY=true
                break
              fi
              echo "⏳ Attempt $i/$MAX_RETRIES: got status $STATUS, retrying..."
            done

            if [ "$HEALTHY" = false ]; then
              echo "❌ Health check failed after $MAX_RETRIES attempts."
              echo "Rolling back to previous container..."
              sudo docker rm sribuu 2>/dev/null || true
              if [ -n "$PREV_IMAGE" ]; then
                sudo docker pull "$PREV_IMAGE" || true
                sudo docker run -d --name sribuu --network host --restart always \
                  -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                  -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
                  -e DEBUG="false" \
                  "$PREV_IMAGE"
                echo "🔄 Rollback completed to $PREV_IMAGE"
              else
                echo "⚠️ No previous image to roll back to — container not started."
              fi
              exit 1
            fi

            # --- Inline smoke test: verify 3 critical endpoints ---
            echo "=== Running inline smoke test ==="
            SMOKE_FAILED=false

            # 1. Health endpoint
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/health")
            if [ "$HEALTH_STATUS" != "200" ]; then
              echo "❌ Smoke: /health → $HEALTH_STATUS (expected 200)"
              SMOKE_FAILED=true
            else
              echo "✅ Smoke: /health → 200"
            fi

            # 2. Categories endpoint (public API, no auth needed)
            CAT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/api/categories")
            if [ "$CAT_STATUS" != "200" ]; then
              echo "❌ Smoke: /api/categories → $CAT_STATUS (expected 200)"
              SMOKE_FAILED=true
            else
              echo "✅ Smoke: /api/categories → 200"
            fi

            # 3. Login page / main page
            MAIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/")
            if [ "$MAIN_STATUS" != "200" ]; then
              echo "❌ Smoke: / → $MAIN_STATUS (expected 200)"
              SMOKE_FAILED=true
            else
              echo "✅ Smoke: / → 200"
            fi

            if [ "$SMOKE_FAILED" = true ]; then
              echo "❌ Smoke test FAILED. Rolling back..."
              sudo docker rm sribuu 2>/dev/null || true
              if [ -n "$PREV_IMAGE" ]; then
                sudo docker pull "$PREV_IMAGE" || true
                sudo docker run -d --name sribuu --network host --restart always \
                  -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                  -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
                  -e DEBUG="false" \
                  "$PREV_IMAGE"
                echo "🔄 Rollback completed to $PREV_IMAGE"
              else
                echo "⚠️ No previous image to roll back to — container stopped."
              fi
              exit 1
            fi

            echo "✅ Inline smoke test passed — deploy successful!"

      - name: Trigger deploy health check dispatch
        if: success()
        run: |
          echo "Deploy job completed successfully. Post-deploy smoke tests run in the SSH script above."

