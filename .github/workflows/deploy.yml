name: Deploy

on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types:
      - completed

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "🚀 Deploy to VPS"
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.ref == 'refs/heads/main' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script_stop: true
          script: |
            set -e

            echo "=== Stopping old native systemd service ==="
            sudo systemctl stop sribuu 2>/dev/null || true
            sudo systemctl disable sribuu 2>/dev/null || true

            echo "=== Pulling latest Docker image ==="
            sudo docker pull ghcr.io/lafuan/sribuu:latest || true

            echo "=== Checking if image changed ==="
            NEW_DIGEST=$(sudo docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/lafuan/sribuu:latest 2>/dev/null || echo "unknown")
            OLD_DIGEST=$(sudo docker inspect --format='{{index .RepoDigests 0}}' sribuu 2>/dev/null || echo "none")
            if [ "$NEW_DIGEST" = "$OLD_DIGEST" ]; then
              echo "=== Image unchanged, forcing re-pull ==="
              sudo docker pull --disable-content-trust ghcr.io/lafuan/sribuu:latest
            fi

            echo "=== Stopping old container ==="
            sudo docker stop sribuu 2>/dev/null || true
            sudo docker rm sribuu 2>/dev/null || true

            echo "=== Starting new container ==="
            sudo docker run -d --name sribuu --network host --restart always \
              -e DATABASE_URL="postgresql+asyncpg://sribuu:sribuu_dev_2026@localhost:5432/sribuu" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DEBUG="false" \
              ghcr.io/lafuan/sribuu:latest

            echo "=== Cleaning up old images ==="
            sudo docker image prune -f

            echo "=== Health check ==="
            MAX_RETRIES=5
            RETRY_DELAY=3
            for i in $(seq 1 $MAX_RETRIES); do
              sleep "$RETRY_DELAY"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/health" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed (attempt $i/$MAX_RETRIES)"
                exit 0
              fi
              echo "⏳ Attempt $i/$MAX_RETRIES: got status $STATUS, retrying..."
            done

            # Health check gagal — rollback to previous tag
            echo "❌ Health check failed after $MAX_RETRIES attempts."
            echo "Rolling back to previous container..."
            sudo docker rm sribuu 2>/dev/null || true
            IMAGE_TAG=$(sudo docker images ghcr.io/lafuan/sribuu --format "{{.Tag}}" | grep -v latest | tail -1)
            if [ -n "$IMAGE_TAG" ]; then
              sudo docker run -d --name sribuu --network host --restart always \
                -e DATABASE_URL="postgresql+asyncpg://sribuu:sribuu_dev_2026@localhost:5432/sribuu" \
                -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
                -e DEBUG="false" \
                "ghcr.io/lafuan/sribuu:$IMAGE_TAG"
              echo "🔄 Rollback completed to tag $IMAGE_TAG"
            fi
            exit 1

  smoke-test:
    name: "🎭 Post-Deploy Smoke Test"
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright httpx
      - name: Install Playwright browser
        run: playwright install --with-deps chromium
      - name: Run smoke tests against production
        run: |
          python << 'EOF'
          import asyncio
          import httpx
          import time

          BASE_URL = "https://sribuu.duckdns.org"
          EMAIL = f"smoke-{int(time.time())}@test.com"
          PASSWORD = "SmokeTest123!"

          async def smoke_test():
              errors = []
              
              async with httpx.AsyncClient() as client:
                  # 0. Register a test user
                  try:
                      r = await client.post(f"{BASE_URL}/api/auth/register", json={
                          "name": "Smoke Test",
                          "email": EMAIL,
                          "password": PASSWORD,
                      }, timeout=10)
                      if r.status_code not in (200, 201):
                          errors.append(f"Register failed: {r.status_code} - {r.text}")
                      else:
                          print("✅ Register OK")
                  except Exception as e:
                      errors.append(f"Register error: {e}")

                  # 1. Health check
                  try:
                      r = await client.get(f"{BASE_URL}/health", timeout=10)
                      if r.status_code != 200:
                          errors.append(f"Health check failed: {r.status_code}")
                      else:
                          print("✅ Health check OK")
                  except Exception as e:
                      errors.append(f"Health check error: {e}")

                  # 2. Login
                  try:
                      r = await client.post(f"{BASE_URL}/api/auth/login", json={
                          "email": EMAIL, "password": PASSWORD
                      }, timeout=10)
                      if r.status_code != 200:
                          errors.append(f"Login failed: {r.status_code} - {r.text}")
                      else:
                          print("✅ Login OK")
                          token = r.json().get("data", {}).get("token")
                          if not token:
                              errors.append("No token in login response")
                          else:
                              # 3. Dashboard stats
                              headers = {"Authorization": f"Bearer {token}"}
                              r2 = await client.get(f"{BASE_URL}/api/stats/summary", headers=headers, timeout=10)
                              if r2.status_code != 200:
                                  errors.append(f"Dashboard stats failed: {r2.status_code}")
                              else:
                                  print("✅ Dashboard stats OK")
                              
                              # 4. Transactions list
                              r3 = await client.get(f"{BASE_URL}/api/transactions", headers=headers, timeout=10)
                              if r3.status_code != 200:
                                  errors.append(f"Transactions list failed: {r3.status_code}")
                              else:
                                  print("✅ Transactions list OK")
                  except Exception as e:
                      errors.append(f"Login/test error: {e}")

              if errors:
                  print("\n❌ Smoke test failures:")
                  for e in errors:
                      print(f"  - {e}")
                  exit(1)
              else:
                  print("\n✅ All smoke tests passed!")

          asyncio.run(smoke_test())
          EOF

