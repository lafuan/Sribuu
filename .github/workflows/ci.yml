name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: "🔍 Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  bandit:
    name: "🛡️ Bandit SAST"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run Bandit
        run: bandit -c pyproject.toml -r backend/

  ruff:
    name: "🧹 Ruff Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: check

  mypy:
    name: "🔬 Mypy Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt mypy
      - name: Run mypy
        run: mypy backend/

  pytest:
    name: "🧪 Tests (${{ matrix.suite }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run ${{ matrix.suite }} tests
        if: matrix.suite == 'frontend'
        run: |
          pip install pytest-html 2>/dev/null || true
          pytest frontend/tests/ -v --tb=short

      - name: Install backend + run tests
        if: matrix.suite == 'backend'
        run: |
          pip install -e .
          pytest backend/tests/ -v --tb=short

  pytest-cov:
    name: "📊 Coverage"
    runs-on: ubuntu-latest
    needs: [pytest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest-cov
          pip install -e .
      - name: Run tests with coverage
        run: |
          pytest backend/tests/ frontend/tests/ \
            --cov=backend \
            --cov=frontend \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=49 \
            -v
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  codeql:
    name: "🔎 CodeQL Analysis"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
