name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-ios:
    name: "🍎 Build iOS IPA"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (archive only, no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Create unsigned IPA from .app bundle
        run: |
          echo "📦 Creating unsigned IPA..."

          # Flutter --no-codesign puts .app inside xcarchive
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Runner.app not found at $APP_PATH"
            echo "Searching for .app:"
            find build/ios -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "✅ Found: $APP_PATH"
          ls -lh "$APP_PATH"

          # Create IPA manually: IPA = Payload/ + .app
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          # Validate Info.plist exists
          if [ ! -f "Payload/Runner.app/Info.plist" ]; then
            echo "❌ Info.plist missing in Payload"
            exit 1
          fi

          # Create IPA (zip of Payload/)
          mkdir -p build/ios/ipa
          IPA_NAME="Sribuu-unsigned.ipa"
          zip -qr "build/ios/ipa/$IPA_NAME" Payload/

          echo "✅ IPA created:"
          ls -lh "build/ios/ipa/$IPA_NAME"

          # Verify IPA is valid zip with Payload/
          unzip -l "build/ios/ipa/$IPA_NAME" | grep -q "Payload/Runner.app"
          echo "✅ IPA structure valid"

          # Cleanup
          rm -rf Payload

      - name: Verify IPA
        run: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ NO IPA GENERATED!"
            exit 1
          fi
          SIZE=$(stat -f%z "$IPA")
          echo "IPA_SIZE=$SIZE" >> $GITHUB_ENV
          echo "IPA_NAME=$(basename "$IPA")" >> $GITHUB_ENV

          if [ "$SIZE" -lt 500000 ]; then
            echo "⚠️  IPA too small ($SIZE bytes) — likely empty"
            exit 1
          fi
          echo "✅ IPA: $(basename "$IPA") ($SIZE bytes)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sribuu-ios-unsigned
          path: flutter_app/build/ios/ipa/*.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Upload to Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload ${{ github.ref_name }} \
            build/ios/ipa/*.ipa \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
