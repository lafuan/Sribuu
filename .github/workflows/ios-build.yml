name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: "🍎 Build iOS IPA"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (archive + IPA)
        run: flutter build ipa --release --no-codesign

      - name: Export unsigned IPA from xcarchive
        run: |
          if [ -f "build/ios/ipa/Runner.ipa" ]; then
            echo "✅ IPA already generated by Flutter"
            ls -lh build/ios/ipa/Runner.ipa
            exit 0
          fi

          echo "📦 Manually exporting IPA from xcarchive..."
          mkdir -p build/ios/ipa

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "📦 IPA output:"
          ls -lh build/ios/ipa/

      - name: Verify IPA exists
        run: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            SIZE=$(stat -f%z "$IPA")
            echo "IPA_SIZE=$SIZE" >> $GITHUB_ENV
            echo "IPA_NAME=$(basename "$IPA")" >> $GITHUB_ENV
            echo "✅ IPA: $IPA ($SIZE bytes)"
          else
            echo "❌ NO IPA GENERATED!"
            echo "Archive contents:"
            find build/ios/archive -name "*.app" -maxdepth 5 2>/dev/null | head -5
            exit 1
          fi

      - name: Size check
        run: |
          echo "Size: ${{ env.IPA_SIZE }} bytes"
          if [ "${{ env.IPA_SIZE }}" -lt 1000000 ]; then
            echo "⚠️  IPA too small — likely broken"
            exit 1
          fi
          echo "✅ IPA size OK"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sribuu-ios-unsigned
          path: flutter_app/build/ios/ipa/*.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Upload to Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload ${{ github.ref_name }} \
            build/ios/ipa/*.ipa \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
