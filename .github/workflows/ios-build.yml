name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: "🍎 Build iOS IPA"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (archive only)
        run: flutter build ipa --release --no-codesign

      - name: Generate unsigned IPA from xcarchive
        run: |
          mkdir -p build/ios/ipa
          xcrun -sdk iphoneos PackageApplication \
            -v build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app \
            -o "$(pwd)/build/ios/ipa/sribuu.ipa"
        continue-on-error: true

      - name: Generate IPA via export (fallback)
        if: failure()
        run: |
          mkdir -p build/ios/ipa
          cat > build/ios/ipa/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string></string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist build/ios/ipa/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

      - name: Verify IPA exists
        run: |
          echo "IPA files:"
          ls -la build/ios/ipa/ 2>/dev/null || echo "No IPA found"
          echo "Archive content:"
          ls -la build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/ 2>/dev/null | head -5 || echo "No archive"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sribuu-ios-unsigned
          path: |
            flutter_app/build/ios/ipa/*.ipa
            flutter_app/build/ios/archive/Runner.xcarchive
          retention-days: 7
          if-no-files-found: warn

      - name: Upload to Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload ${{ github.ref_name }} \
            build/ios/ipa/*.ipa \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
