name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: "🍎 Build iOS IPA"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (archive + IPA)
        run: flutter build ipa --release --no-codesign

      - name: Generate unsigned IPA (fallback if flutter build ipa skipped IPA)
        if: always()
        run: |
          # Skip if Runner.ipa was already produced
          if [ -f "build/ios/ipa/Runner.ipa" ]; then
            echo "✅ IPA already generated by Flutter — skipping fallback"
            ls -lh build/ios/ipa/Runner.ipa
            exit 0
          fi

          # Try xcodebuild export from xcarchive
          echo "Flutter build ipa did not produce .ipa — trying xcodebuild export..."
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xcodebuild.log || true

          if ls build/ios/ipa/*.ipa 1>/dev/null 2>&1; then
            echo "✅ IPA exported via xcodebuild"
            ls -lh build/ios/ipa/*.ipa
            exit 0
          fi

          # Manual IPA creation (always works — IPA is just zip of Payload/)
          echo "xcodebuild failed — creating IPA manually..."
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Runner.app not found at $APP_PATH"
            find build/ios -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          mkdir -p Payload && cp -R "$APP_PATH" Payload/
          cd Payload && zip -qr "../build/ios/ipa/Sribuu-unsigned.ipa" Runner.app && cd ..
          rm -rf Payload
          echo "✅ IPA created manually"
          ls -lh build/ios/ipa/*.ipa

      - name: Verify IPA
        run: |
          if ls build/ios/ipa/*.ipa 1>/dev/null 2>&1; then
            SIZE=$(stat -c%s build/ios/ipa/*.ipa 2>/dev/null || stat -f%z build/ios/ipa/*.ipa 2>/dev/null)
            echo "✅ IPA found (${SIZE} bytes)"
            ls -lh build/ios/ipa/*.ipa
            if [ "${SIZE:-0}" -lt 1048576 ]; then
              echo "⚠️  IPA is suspiciously small (<1MB)"
            fi
          else
            echo "❌ No IPA generated!"
            find build/ios -name "*.ipa" -o -name "*.app" -type d 2>/dev/null
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sribuu-ios-unsigned
          path: flutter_app/build/ios/ipa/*.ipa
          retention-days: 7
          if-no-files-found: error
