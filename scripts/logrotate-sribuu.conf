# ─────────────────────────────────────────────────────────────────────
# Logrotate configuration for Sribuu
# Daily rotation, keep 7 days, compress old logs
# ─────────────────────────────────────────────────────────────────────

/var/log/sribuu/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 644 sribuu sribuu
    sharedscripts
    postrotate
        systemctl reload sribuu > /dev/null 2>&1 || true
    endscript
}

/var/log/nginx/sribuu-access.log
/var/log/nginx/sribuu-error.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 644 www-data adm
    sharedscripts
    postrotate
        systemctl reload nginx > /dev/null 2>&1 || true
    endscript
}
