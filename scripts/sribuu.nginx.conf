# ─────────────────────────────────────────────────────────────────────
# Sribuu — Nginx Configuration
# Reverse proxy untuk Uvicorn (127.0.0.1:8000)
# ─────────────────────────────────────────────────────────────────────

upstream sribuu_backend {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name sribuu.example.com;  # Ganti dengan domain anda

    # Redirect HTTP ke HTTPS (uncomment setelah SSL siap)
    # return 301 https://$host$request_uri;

    # Logs
    access_log /var/log/nginx/sribuu-access.log;
    error_log /var/log/nginx/sribuu-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client max body size (upload)
    client_max_body_size 10M;

    # Static files — serve directly
    location /static/ {
        alias /opt/sribuu/frontend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check (no logging)
    location /health {
        proxy_pass http://sribuu_backend/health;
        access_log off;
        proxy_set_header Host $host;
    }

    # Proxy all other requests to FastAPI
    location / {
        proxy_pass http://sribuu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }
}

