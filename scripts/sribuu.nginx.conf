# ─────────────────────────────────────────────────────────────────────
# Sribuu — Nginx Configuration (Production, HTTPS)
# Reverse proxy untuk Uvicorn (127.0.0.1:8000)
#
# CATATAN PENTING:
# 1. Ganti semua "sribuu.duckdns.org" dengan domain Anda.
# 2. Rate limiting butuh definisi zona di blok `http` (nginx.conf utama):
#      limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
#      limit_req_zone $binary_remote_addr zone=register:10m rate=2r/m;
#    Tambahkan dua baris itu ke /etc/nginx/nginx.conf di dalam blok http {}.
# 3. SSL cert dihasilkan oleh certbot:
#      sudo certbot --nginx -d sribuu.duckdns.org
# 4. CSP di bawah meng-whitelist semua CDN yang dipakai aplikasi
#    (Tailwind, Font Awesome, jsdelivr, unpkg, Google Fonts).
#    JANGAN hapus domain CDN dari script-src/style-src/font-src,
#    nanti CSS/ikon ke-blok dan UI tampil rusak (unstyled).
# ─────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name sribuu.duckdns.org;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name sribuu.duckdns.org;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/sribuu.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sribuu.duckdns.org/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.gstatic.com; connect-src 'self'" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Client max body size (upload)
    client_max_body_size 10M;

    # Rate limiting (login endpoint) — butuh zona `login` di blok http (lihat catatan di atas)
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Register rate limit — butuh zona `register` di blok http
    location /api/auth/register {
        limit_req zone=register burst=2 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static files
    location /static/ {
        alias /home/ubuntu/Sribuu/frontend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }
}
